services:
  # Generate dialog dataset
  generate:
    build: .
    command: ["generate.py", "--count", "120", "--output", "data/chats.json", "--concurrency", "5"]
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./results:/app/results

  # Analyze dialogs
  analyze:
    build: .
    command: ["analyze.py", "--input", "data/chats.json", "--output", "results/analysis.json", "--concurrency", "5"]
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./results:/app/results

  # Evaluate analysis against ground truth
  evaluate:
    build: .
    command: ["evaluate.py", "--chats", "data/chats.json", "--analysis", "results/analysis.json", "--output", "results/evaluation.json"]
    volumes:
      - ./data:/app/data
      - ./results:/app/results

  # Run tests
  test:
    build: .
    command: ["-m", "pytest", "tests/", "-v"]
    env_file:
      - .env
